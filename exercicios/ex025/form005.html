<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulário</title>
</head>

<body>
    
    <h1>Exemplo Formulário</h1>
    <form action="cadastro.php" method="get" autocomplete="on"></form>
    <fieldset>
        <legend>Sexo</legend>
        <input type="radio" name="sexo" id="isxmas" value="M"><label for="isxmas">Masculino</label><br>
        <input type="radio" name="sexo" id="isxfem" value="F" checked><label for="isxfem">Feminino</label>
        <!--TODO botão de radio é para escolher uma opção tipo radio + name"igual"  e id"diferente"-->
        
    </fieldset>
    <fieldset>
        <legend>Esportes Favoritos</legend>
        <input type="checkbox" name="esbas" id="iesbas"><label for="iesbas">Basquete</label><br>
        <input type="checkbox" name="esfut" id="iesfut" checked><label for="iesfut">Futebol</label><br>
        <input type="checkbox" name="esnat" id="iesnat"><label for="iesnat">Natação</label><br>
        <input type="checkbox" name="esten" id="iesten"><label for="iesten">Tênis</label><br>
    </fieldset>

    <p>
        <input type="submit" value="Enviar">
        <input type="reset" value="Limpar">
    </p>
</body>
